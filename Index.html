<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glory VN Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #07090e;
      --surface:  #0c0f18;
      --surface2: #101520;
      --border:   #1a2235;
      --border2:  #1f2d42;
      --cyan:     #00e5ff;
      --cyan-dim: #00a8c4;
      --cglow:    rgba(0,229,255,0.15);
      --green:    #00ff88;
      --red:      #ff3d5a;
      --yellow:   #ffc940;
      --text:     #c5d6ea;
      --muted:    #3d5068;
      --mono:     'Share Tech Mono', monospace;
      --ui:       'Rajdhani', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      min-height: 100vh;
      padding-bottom: 60px;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,229,255,0.012) 3px, rgba(0,229,255,0.012) 4px
      );
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .hdr {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px;
      background: rgba(7,9,14,0.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 30px; height: 30px;
      border: 1.5px solid var(--cyan);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      box-shadow: 0 0 12px var(--cglow), inset 0 0 8px rgba(0,229,255,0.06);
    }
    .brand-name {
      font-family: var(--mono);
      font-size: 0.95rem;
      color: var(--cyan);
      letter-spacing: 3px;
      text-shadow: 0 0 14px rgba(0,229,255,0.5);
    }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .srv-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 1.5px; }
    .srv-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      transition: background .3s, box-shadow .3s;
    }
    .srv-dot.on {
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: pdot 2.2s ease-in-out infinite;
    }
    @keyframes pdot { 0%,100%{box-shadow:0 0 6px var(--green)} 50%{box-shadow:0 0 16px var(--green)} }

    /* ── Token bar ──────────────────────────────────────────────────────── */
    .tok-bar {
      display: flex; gap: 8px;
      padding: 11px 22px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tok-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 12px;
      font-family: var(--mono);
      font-size: 0.78rem;
      outline: none;
      transition: border-color .2s;
    }
    .tok-bar input:focus { border-color: var(--cyan-dim); }
    .tok-bar button {
      background: transparent;
      border: 1px solid var(--cyan-dim);
      border-radius: 6px;
      color: var(--cyan);
      padding: 7px 18px;
      font-family: var(--ui);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
    }
    .tok-bar button:hover { background: var(--cglow); box-shadow: 0 0 10px var(--cglow); }

    /* ── Main ───────────────────────────────────────────────────────────── */
    .main {
      max-width: 580px;
      margin: 0 auto;
      padding: 18px 14px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── Status card ────────────────────────────────────────────────────── */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
    }
    .st-left { display: flex; flex-direction: column; gap: 5px; }
    .st-lbl {
      font-family: var(--mono); font-size: 0.62rem;
      color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
    }
    .st-val {
      font-family: var(--mono); font-size: 1.05rem; font-weight: 600;
      transition: color .3s, text-shadow .3s;
    }
    .st-val.waiting    { color: var(--muted); }
    .st-val.connecting { color: var(--yellow); text-shadow: 0 0 10px rgba(255,201,64,.4); }
    .st-val.connected  { color: var(--green);  text-shadow: 0 0 12px rgba(0,255,136,.4);
      animation: glow-text 2s ease-in-out infinite; }
    .st-val.error      { color: var(--red);    text-shadow: 0 0 10px rgba(255,61,90,.4); }
    @keyframes glow-text { 0%,100%{text-shadow:0 0 8px rgba(0,255,136,.3)} 50%{text-shadow:0 0 18px rgba(0,255,136,.6)} }
    .st-msg {
      font-family: var(--mono); font-size: 0.7rem; color: var(--muted); min-height: 14px;
    }
    .st-msg.err { color: var(--red); }
    .st-seen {
      font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
    }
    .st-right { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

    .btn-conn, .btn-disc {
      border-radius: 7px; padding: 9px 22px;
      font-family: var(--ui); font-size: 0.92rem; font-weight: 700;
      letter-spacing: 1px; cursor: pointer;
      transition: opacity .2s, box-shadow .2s, transform .1s;
      border: none;
    }
    .btn-conn:active, .btn-disc:active { transform: scale(.97); }
    .btn-conn {
      background: var(--cyan); color: #000;
      box-shadow: 0 0 16px rgba(0,229,255,.3);
    }
    .btn-conn:hover:not(:disabled) { box-shadow: 0 0 26px rgba(0,229,255,.55); }
    .btn-conn:disabled { opacity: .3; cursor: not-allowed; }
    .btn-disc {
      background: transparent;
      border: 1px solid var(--red) !important;
      color: var(--red);
    }
    .btn-disc:hover:not(:disabled) { background: rgba(255,61,90,.08); }
    .btn-disc:disabled { opacity: .25; cursor: not-allowed; }

    /* ── Section label ──────────────────────────────────────────────────── */
    .sec-lbl {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 0.62rem;
      color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
    }
    .sec-lbl::after { content:""; flex:1; height:1px; background: var(--border); }

    /* ── Feature card ───────────────────────────────────────────────────── */
    .feat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .tog-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .tog-row:last-child { border-bottom: none; }
    .tog-row:hover { background: rgba(0,229,255,0.03); }
    .feat-info { display: flex; flex-direction: column; gap: 2px; }
    .feat-name { font-size: 0.93rem; font-weight: 600; color: var(--text); letter-spacing: .3px; }
    .feat-desc { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }

    /* Toggle switch */
    .sw { position: relative; width: 44px; height: 24px; flex-shrink: 0; cursor: pointer; }
    .sw input { opacity: 0; width: 0; height: 0; }
    .sw-track {
      position: absolute; inset: 0;
      background: var(--border2); border-radius: 24px;
      transition: background .25s, box-shadow .25s;
    }
    .sw-track::before {
      content: ""; position: absolute;
      width: 18px; height: 18px; left: 3px; top: 3px;
      background: var(--muted); border-radius: 50%;
      transition: transform .25s, background .25s;
    }
    input:checked ~ .sw-track,
    input:checked + .sw-track {
      background: rgba(0,229,255,.12);
      border: 1px solid var(--cyan-dim);
      box-shadow: 0 0 10px var(--cglow);
    }
    input:checked ~ .sw-track::before,
    input:checked + .sw-track::before {
      transform: translateX(20px);
      background: var(--cyan);
    }

    /* Select row */
    .sel-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
    }
    .sel-row select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 12px;
      font-family: var(--mono); font-size: 0.78rem;
      outline: none; cursor: pointer;
      transition: border-color .2s;
    }
    .sel-row select:focus { border-color: var(--cyan-dim); }
    .sel-row select:disabled { opacity: .35; cursor: not-allowed; }

    /* Last updated */
    #last-update {
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--muted); text-align: center; letter-spacing: .5px;
    }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border2); border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading {
      text-align: center; padding: 44px 0;
      color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      font-family: var(--mono); font-size: 0.78rem; letter-spacing: 1px;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 22px; right: 18px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 9px 16px;
      font-family: var(--mono); font-size: 0.78rem;
      color: var(--text); letter-spacing: .5px;
      opacity: 0; transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok   { border-color: var(--green); color: var(--green); }
    #toast.err  { border-color: var(--red);   color: var(--red); }
    #toast.inf  { border-color: var(--cyan-dim); color: var(--cyan); }
  </style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <span class="brand-name">GLORY_VN</span>
  </div>
  <div class="hdr-right">
    <span class="srv-label">SERVER</span>
    <div class="srv-dot" id="srv-dot"></div>
  </div>
</div>

<!-- Token -->
<div class="tok-bar">
  <input type="password" id="tok-input" placeholder="API Secret Token..." />
  <button onclick="saveToken()">LƯU</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Client status -->
  <div class="status-card">
    <div class="st-left">
      <span class="st-lbl">CLIENT STATUS</span>
      <span class="st-val waiting" id="st-val">WAITING</span>
      <span class="st-msg" id="st-msg"></span>
      <span class="st-seen" id="st-seen"></span>
    </div>
    <div class="st-right">
      <button class="btn-conn" id="btn-conn" onclick="doConnect()">CONNECT</button>
      <button class="btn-disc" id="btn-disc" onclick="doDisconnect()" disabled>DISCONNECT</button>
    </div>
  </div>

  <!-- Features -->
  <div id="panel">
    <div id="loading">
      <div class="spinner"></div>
      <span>LOADING CONFIG...</span>
    </div>
  </div>

  <div id="last-update"></div>
</div>
<div id="toast"></div>

<script>
  const FEATURES = [
    {
      sec: "// AIM",
      items: [
        { key: "AimbotNewEnabled", name: "AimBot",       desc: "// aimbot engine" },
      ]
    },
    {
      sec: "// ESP_VISUAL",
      items: [
        { key: "ESPLine",     name: "ESP Line",     desc: "// line to enemy" },
        { key: "ESPBox2",     name: "ESP Box",      desc: "// bounding box" },
        { key: "ESPWukong",   name: "ESP Wukong",   desc: "// wukong detection" },
        { key: "ESPInfo",     name: "ESP Info",     desc: "// name + health" },
        { key: "ESPSkeleton", name: "ESP Skeleton", desc: "// skeleton render" },
      ]
    },
    {
      sec: "// MISC",
      items: [
        { key: "ESPREFRESH", name: "ESP Refresh", desc: "// auto clear cache" },
        { key: "FixEsp",     name: "ESP Fix",     desc: "// fix render glitch" },
      ]
    }
  ];

  let token  = localStorage.getItem("gv_tok") || "";
  let config = {};
  document.getElementById("tok-input").value = token;

  function saveToken() {
    token = document.getElementById("tok-input").value.trim();
    localStorage.setItem("gv_tok", token);
    toast("TOKEN SAVED ✓", "ok");
  }

  // ── Poll ──────────────────────────────────────────────────────────────────
  async function poll() {
    try {
      const r = await fetch("/api/config");
      if (!r.ok) throw 0;
      config = await r.json();
      document.getElementById("srv-dot").classList.add("on");
      renderPanel();
      renderStatus();
      renderLastUpdated();
    } catch {
      document.getElementById("srv-dot").classList.remove("on");
    }
  }
  poll();
  setInterval(poll, 2500);

  // ── Render status card ────────────────────────────────────────────────────
  function renderStatus() {
    const st   = config.client_status  || "waiting";
    const msg  = config.client_message || "";
    const seen = config.client_last_seen;

    const stEl   = document.getElementById("st-val");
    const msgEl  = document.getElementById("st-msg");
    const seenEl = document.getElementById("st-seen");

    stEl.className = "st-val " + st;
    stEl.textContent = st.toUpperCase();

    msgEl.textContent = msg;
    msgEl.className = "st-msg" + (st === "error" ? " err" : "");

    seenEl.textContent = seen
      ? "last_seen › " + new Date(seen + "Z").toLocaleTimeString("vi-VN")
      : "";

    const isConn = st === "connected";
    const isBusy = st === "connecting" || !!config.connect;
    document.getElementById("btn-conn").disabled = isConn || isBusy;
    document.getElementById("btn-disc").disabled = !isConn;
  }

  // ── CONNECT ───────────────────────────────────────────────────────────────
  async function doConnect() {
    document.getElementById("btn-conn").disabled = true;
    await apiPost({ connect: true, disconnect: false });
    toast("LỆNH CONNECT ĐÃ GỬI →", "inf");
  }

  // ── DISCONNECT ────────────────────────────────────────────────────────────
  async function doDisconnect() {
    await apiPost({ disconnect: true, connect: false });
    toast("LỆNH DISCONNECT ĐÃ GỬI →", "inf");
  }

  // ── Toggle feature ────────────────────────────────────────────────────────
  async function handleToggle(key, val) {
    config[key] = val;
    renderPanel();
    const ok = await apiPost({ [key]: val });
    if (ok) toast(key + (val ? ": ON ✓" : ": OFF ✓"), "ok");
  }

  async function handleLinePos(val) {
    const ok = await apiPost({ linePosition: val });
    if (ok) toast("linePosition: " + val, "ok");
  }

  // ── apiPost helper ────────────────────────────────────────────────────────
  async function apiPost(body) {
    try {
      const r = await fetch("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-API-Secret": token },
        body: JSON.stringify(body)
      });
      const d = await r.json();
      if (!r.ok) { toast("LỖI: " + (d.error || r.status), "err"); return false; }
      config = d.config;
      renderPanel();
      renderStatus();
      renderLastUpdated();
      return true;
    } catch {
      toast("NETWORK ERROR", "err");
      return false;
    }
  }

  // ── Render features panel ─────────────────────────────────────────────────
  function renderPanel() {
    const panel = document.getElementById("panel");
    panel.innerHTML = "";

    FEATURES.forEach(sec => {
      const lbl = document.createElement("div");
      lbl.className = "sec-lbl";
      lbl.textContent = sec.sec;
      panel.appendChild(lbl);

      const card = document.createElement("div");
      card.className = "feat-card";

      sec.items.forEach(item => {
        const on = !!config[item.key];
        const row = document.createElement("div");
        row.className = "tog-row";
        row.innerHTML = `
          <div class="feat-info">
            <span class="feat-name">${item.name}</span>
            <span class="feat-desc">${item.desc}</span>
          </div>
          <label class="sw" onclick="event.stopPropagation()">
            <input type="checkbox" ${on ? "checked" : ""}
              onchange="handleToggle('${item.key}', this.checked)" />
            <span class="sw-track"></span>
          </label>`;
        card.appendChild(row);
      });
      panel.appendChild(card);
    });

    // linePosition
    const lbl2 = document.createElement("div");
    lbl2.className = "sec-lbl";
    lbl2.textContent = "// ESP_LINE_POSITION";
    panel.appendChild(lbl2);

    const lpc = document.createElement("div");
    lpc.className = "feat-card";
    const dis = !config.ESPLine ? "disabled" : "";
    lpc.innerHTML = `
      <div class="sel-row">
        <div class="feat-info">
          <span class="feat-name">Line Position</span>
          <span class="feat-desc">// origin point of ESP line</span>
        </div>
        <select ${dis} onchange="handleLinePos(this.value)">
          <option value="Top"    ${config.linePosition==="Top"   ?"selected":""}>Top</option>
          <option value="Bottom" ${config.linePosition==="Bottom"?"selected":""}>Bottom</option>
          <option value="Center" ${config.linePosition==="Center"?"selected":""}>Center</option>
        </select>
      </div>`;
    panel.appendChild(lpc);
  }

  function renderLastUpdated() {
    const el = document.getElementById("last-update");
    if (config.last_updated) {
      const d = new Date(config.last_updated + "Z");
      el.textContent = "updated › " + d.toLocaleTimeString("vi-VN");
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let _tt;
  function toast(msg, cls) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "show " + (cls || "");
    clearTimeout(_tt);
    _tt = setTimeout(() => { el.className = ""; }, 2600);
  }
</script>
</body>
</html>
